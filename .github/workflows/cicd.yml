name: SKP CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: "us-east-1"
  GLUE_TRIGGER_FUNCTION_NAME: "skp-glue-trigger-dev"
  GLUE_JOB_NAME: "skp-keyword-performance-dev"
  S3_RAW_BUCKET: "skp-raw-dev-099622553872"
  APP_ENV: "dev"

jobs:
  # CI: Test and Quality Checks
  # Runs on: every push and pull request
  ci:
    name: "CI — Test & Quality"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Glue scripts
        run: |
          echo "Linting Glue scripts..."
          flake8 src/glue/ --max-line-length=120 \
            --ignore=E121,E122,E123,E124,E125,E126,E127,E128,E221,E226,E231,E241,E272,E301,E302,E402,F401,W503,W504 \
            --statistics
          echo "Lint passed."

      - name: Build Glue trigger Lambda package
        run: |
          echo "Building Glue trigger Lambda package..."
          zip -j trigger_lambda.zip src/glue/trigger_lambda.py
          echo "Package size: $(du -sh trigger_lambda.zip)"

      - name: Upload Glue artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skp-glue-artifacts
          path: |
            trigger_lambda.zip
            src/glue/glue_skp_pipeline.py
          retention-days: 1

      - name: CI Summary
        run: |
          echo "========================================"
          echo "CI PASSED"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "========================================"

  # CD: Deploy to AWS Lambda + Glue
  # Runs on: push to main branch only (after CI passes)
  cd:
    name: "CD — Deploy to AWS"
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Glue artifacts
        uses: actions/download-artifact@v4
        with:
          name: skp-glue-artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Glue deploy ──────────────────────────────────────────────────────────
      - name: Upload Glue ETL script to S3
        run: |
          echo "Uploading Glue script..."
          aws s3api put-object \
            --bucket ${{ env.S3_RAW_BUCKET }} \
            --key glue/glue_skp_pipeline.py \
            --body src/glue/glue_skp_pipeline.py \
            --region ${{ env.AWS_REGION }}
          echo "Glue script uploaded — job picks up new script on next run."

      - name: Deploy Glue trigger Lambda
        run: |
          echo "Deploying Glue trigger Lambda..."
          aws s3api put-object \
            --bucket ${{ env.S3_RAW_BUCKET }} \
            --key glue/trigger_lambda.zip \
            --body trigger_lambda.zip \
            --region ${{ env.AWS_REGION }}
          aws lambda update-function-code \
            --function-name ${{ env.GLUE_TRIGGER_FUNCTION_NAME }} \
            --s3-bucket ${{ env.S3_RAW_BUCKET }} \
            --s3-key glue/trigger_lambda.zip
          aws lambda wait function-updated \
            --function-name ${{ env.GLUE_TRIGGER_FUNCTION_NAME }}
          echo "Glue trigger Lambda deployed."

      - name: Verify Glue job is ready
        run: |
          echo "Checking Glue job status..."
          STATE=$(aws glue get-job --job-name ${{ env.GLUE_JOB_NAME }} \
            --query 'Job.Name' --output text 2>/dev/null || echo "NOT_FOUND")
          if [ "$STATE" = "NOT_FOUND" ]; then
            echo "WARNING: Glue job '${{ env.GLUE_JOB_NAME }}' not found — deploy glue-stack.yaml first."
            exit 1
          fi
          echo "Glue job '${{ env.GLUE_JOB_NAME }}' exists and is ready."

      - name: CD Summary
        run: |
          echo "========================================"
          echo "DEPLOYMENT COMPLETE"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Lambda  : ${{ env.LAMBDA_FUNCTION_NAME }}"
          echo "Glue    : ${{ env.GLUE_JOB_NAME }}"
          echo "Trigger : ${{ env.GLUE_TRIGGER_FUNCTION_NAME }}"
          echo "========================================"
