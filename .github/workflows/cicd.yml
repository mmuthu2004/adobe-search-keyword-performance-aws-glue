name: SKP CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: "us-east-1"
  LAMBDA_FUNCTION_NAME: "skp-search-keyword-performance"
  GLUE_TRIGGER_FUNCTION_NAME: "skp-glue-trigger-dev"
  GLUE_JOB_NAME: "skp-keyword-performance-dev"
  S3_RAW_BUCKET: "skp-raw-dev-099622553872"
  S3_PROCESSED_BUCKET: "skp-processed-dev-099622553872"
  APP_ENV: "dev"

jobs:
  # CI: Test and Quality Checks
  # Runs on: every push and pull request
  ci:
    name: "CI — Test & Quality"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml boto3 pytest flake8

      - name: Code quality check (flake8)
        run: |
          echo "Running flake8 code quality checks (v2)..."
          flake8 src/ --max-line-length=120 --exclude=__pycache__ --ignore=E121,E122,E123,E124,E125,E126,E127,E128,E221,E226,E231,E241,E272,E301,E302,E402,F401,W503,W504 --statistics
        continue-on-error: false

      - name: Run unit tests
        env:
          APP_ENV: dev
          PROCESSED_BUCKET: ""
          LOGS_BUCKET: ""
        run: |
          echo "Running unit tests..."
          PYTHONPATH=src python -m pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          APP_ENV: dev
          PROCESSED_BUCKET: ""
          LOGS_BUCKET: ""
        run: |
          echo "Running integration tests..."
          PYTHONPATH=src python -m pytest tests/integration/ -v --tb=short

      - name: Build Lambda deployment package
        run: |
          echo "Building Lambda package..."
          mkdir -p lambda_package
          cp -r src/* lambda_package/
          pip install pyyaml \
            --platform manylinux2014_x86_64 \
            --target lambda_package/ \
            --implementation cp \
            --python-version 3.12 \
            --only-binary=:all: \
            --upgrade
          cd lambda_package
          zip -r ../skp_lambda.zip . -x "*.pyc" -x "*/__pycache__/*"
          cd ..
          echo "Package size: $(du -sh skp_lambda.zip)"

      - name: Build Glue trigger Lambda package
        run: |
          echo "Building Glue trigger Lambda package..."
          zip -j trigger_lambda.zip src/glue/trigger_lambda.py
          echo "Package size: $(du -sh trigger_lambda.zip)"

      - name: Upload Lambda zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: skp-lambda-zip
          path: skp_lambda.zip
          retention-days: 1

      - name: Upload Glue artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skp-glue-artifacts
          path: |
            trigger_lambda.zip
            src/glue/glue_skp_pipeline.py
          retention-days: 1

      - name: CI Summary
        run: |
          echo "========================================"
          echo "CI PASSED"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "========================================"

  # CD: Deploy to AWS Lambda + Glue
  # Runs on: push to main branch only (after CI passes)
  cd:
    name: "CD — Deploy to AWS"
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Lambda zip artifact
        uses: actions/download-artifact@v4
        with:
          name: skp-lambda-zip

      - name: Download Glue artifacts
        uses: actions/download-artifact@v4
        with:
          name: skp-glue-artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Existing Lambda deploy (unchanged) ──────────────────────────────────
      - name: Upload Lambda zip to S3
        run: |
          echo "Uploading Lambda package to S3..."
          aws s3 cp skp_lambda.zip s3://${{ env.S3_RAW_BUCKET }}/lambda/skp_lambda.zip
          echo "Upload complete."

      - name: Deploy to Lambda
        run: |
          echo "Deploying to Lambda..."
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket ${{ env.S3_RAW_BUCKET }} \
            --s3-key lambda/skp_lambda.zip
          echo "Waiting for Lambda to be ready..."
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}
          echo "Lambda deployment complete."

      # ── Glue deploy (new) ────────────────────────────────────────────────────
      - name: Upload Glue ETL script to S3
        run: |
          echo "Uploading Glue script..."
          aws s3 cp src/glue/glue_skp_pipeline.py \
            s3://${{ env.S3_RAW_BUCKET }}/glue/glue_skp_pipeline.py
          echo "Glue script uploaded — job picks up new script on next run."

      - name: Deploy Glue trigger Lambda
        run: |
          echo "Deploying Glue trigger Lambda..."
          aws s3 cp trigger_lambda.zip \
            s3://${{ env.S3_RAW_BUCKET }}/glue/trigger_lambda.zip
          aws lambda update-function-code \
            --function-name ${{ env.GLUE_TRIGGER_FUNCTION_NAME }} \
            --s3-bucket ${{ env.S3_RAW_BUCKET }} \
            --s3-key glue/trigger_lambda.zip
          aws lambda wait function-updated \
            --function-name ${{ env.GLUE_TRIGGER_FUNCTION_NAME }}
          echo "Glue trigger Lambda deployed."

      - name: Verify Glue job is ready
        run: |
          echo "Checking Glue job status..."
          STATE=$(aws glue get-job --job-name ${{ env.GLUE_JOB_NAME }} \
            --query 'Job.Name' --output text 2>/dev/null || echo "NOT_FOUND")
          if [ "$STATE" = "NOT_FOUND" ]; then
            echo "WARNING: Glue job '${{ env.GLUE_JOB_NAME }}' not found — deploy glue-stack.yaml first."
            exit 1
          fi
          echo "Glue job '${{ env.GLUE_JOB_NAME }}' exists and is ready."

      # ── Smoke test (unchanged) ───────────────────────────────────────────────
      - name: Smoke test
        run: |
          echo "Running smoke test..."

          aws s3 rm s3://${{ env.S3_RAW_BUCKET }}/archive/other/hit_data.tab --quiet || true

          aws s3 cp tests/data/hit_data.tab s3://${{ env.S3_RAW_BUCKET }}/raw/hit_data.tab

          cat > payload.json << 'EOF'
          {
            "Records": [{
              "s3": {
                "bucket": { "name": "skp-raw-dev-099622553872" },
                "object": { "key": "raw/hit_data.tab" }
              }
            }]
          }
          EOF

          aws lambda invoke \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --payload file://payload.json \
            --cli-binary-format raw-in-base64-out \
            response.json

          cat response.json
          STATUS=$(python3 -c "import json; d=json.load(open('response.json')); print(d.get('statusCode',0))")

          if [ "$STATUS" = "200" ]; then
            echo "Smoke test PASSED — statusCode: 200"
          else
            echo "Smoke test FAILED — statusCode: $STATUS"
            exit 1
          fi

      - name: Verify output in S3
        run: |
          echo "Verifying output file in S3..."
          TODAY=$(date +%Y-%m-%d)
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          OUTPUT_KEY="processed/other/year=${YEAR}/month=${MONTH}/day=${DAY}/${TODAY}_SearchKeywordPerformance.tab"

          aws s3 cp s3://${{ env.S3_PROCESSED_BUCKET }}/${OUTPUT_KEY} result.tab

          echo ""
          echo "========================================"
          echo "PIPELINE RESULTS"
          echo "========================================"
          cat result.tab
          echo "========================================"

          if grep -q "google.com" result.tab && grep -q "480" result.tab; then
            echo "Ground truth verification PASSED"
          else
            echo "Ground truth verification FAILED"
            exit 1
          fi

      - name: CD Summary
        run: |
          echo "========================================"
          echo "DEPLOYMENT COMPLETE"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Lambda  : ${{ env.LAMBDA_FUNCTION_NAME }}"
          echo "Glue    : ${{ env.GLUE_JOB_NAME }}"
          echo "Trigger : ${{ env.GLUE_TRIGGER_FUNCTION_NAME }}"
          echo "========================================"
